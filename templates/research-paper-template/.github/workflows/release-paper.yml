name: Release Paper

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper/main.tex
          args: -pdf -interaction=nonstopmode -outdir=build
          work_in_root_file_dir: true

      - name: Attach PDF to release
        uses: softprops/action-gh-release@v2
        with:
          files: paper/build/main.pdf
