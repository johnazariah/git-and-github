name: Build Paper PDF

on:
  push:
    paths:
      - 'paper/**'
      - 'figures/**'
  pull_request:
    paths:
      - 'paper/**'
      - 'figures/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper/main.tex
          args: -pdf -interaction=nonstopmode -outdir=build
          work_in_root_file_dir: true

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/build/main.pdf
          retention-days: 30

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy PDF to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: paper/build
          destination_dir: pdf
          keep_files: true
          commit_message: "Update paper PDF (${{ steps.sha.outputs.short }})"
