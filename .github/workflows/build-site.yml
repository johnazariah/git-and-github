name: Build Site & Generate PDFs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install MkDocs and dependencies
        run: |
          pip install \
            mkdocs-material \
            pymdown-extensions

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Install PDF tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra lmodern > /dev/null 2>&1

      - name: Generate handout PDFs
        run: |
          mkdir -p site/pdfs

          for file in handouts/*.md; do
            filename=$(basename "$file" .md)
            echo "▶ Converting $file → $filename.pdf"
            pandoc "$file" \
              -o "site/pdfs/${filename}.pdf" \
              --pdf-engine=pdflatex \
              -V geometry:margin=2cm \
              -V fontsize=11pt \
              -V colorlinks=true \
              -V linkcolor=blue \
              -V urlcolor=blue \
              --highlight-style=tango \
              -V header-includes='\usepackage{fancyhdr}\pagestyle{fancy}\fancyhead[L]{Git \& GitHub Workshop}\fancyhead[R]{\thepage}'
            echo "✅ Generated: ${filename}.pdf"
          done

          # Also convert the setup guide
          echo "▶ Converting setup guide"
          pandoc pre-workshop/setup-guide.md \
            -o "site/pdfs/setup-guide.pdf" \
            --pdf-engine=pdflatex \
            -V geometry:margin=2cm \
            -V fontsize=11pt \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue \
            --highlight-style=tango \
            -V header-includes='\usepackage{fancyhdr}\pagestyle{fancy}\fancyhead[L]{Git \& GitHub Workshop}\fancyhead[R]{\thepage}'
          echo "✅ Generated: setup-guide.pdf"

          # Also convert the exercise sheets
          for file in exercises/exercise-*.md; do
            filename=$(basename "$file" .md)
            echo "▶ Converting $file → $filename.pdf"
            pandoc "$file" \
              -o "site/pdfs/${filename}.pdf" \
              --pdf-engine=pdflatex \
              -V geometry:margin=2cm \
              -V fontsize=11pt \
              -V colorlinks=true \
              -V linkcolor=blue \
              -V urlcolor=blue \
              --highlight-style=tango \
              -V header-includes='\usepackage{fancyhdr}\pagestyle{fancy}\fancyhead[L]{Git \& GitHub Workshop}\fancyhead[R]{\thepage}'
            echo "✅ Generated: ${filename}.pdf"
          done

          echo ""
          echo "=== Generated PDFs ==="
          ls -la site/pdfs/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload PDFs as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: workshop-handouts-pdf
          path: site/pdfs/*.pdf
          retention-days: 90

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
