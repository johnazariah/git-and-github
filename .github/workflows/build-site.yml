name: Build Site & Generate PDFs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install MkDocs
        run: pip install mkdocs-material pymdown-extensions

      - name: Assemble docs and build site
        run: |
          mkdir -p docs/pre-workshop docs/exercises docs/handouts \
            docs/templates/research-paper-template \
            docs/templates/research-notebook-template

          cp index.md docs/
          cp resources.md docs/
          cp pre-workshop/setup-guide.md docs/pre-workshop/
          cp exercises/exercise-1-solo-repo.md docs/exercises/
          cp exercises/exercise-2-collaboration.md docs/exercises/
          cp handouts/git-cheatsheet.md docs/handouts/
          cp handouts/copilot-one-pager.md docs/handouts/
          cp templates/research-paper-template/README.md docs/templates/research-paper-template/
          cp templates/research-notebook-template/README.md docs/templates/research-notebook-template/

          mkdocs build --strict

      - name: Upload site
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site

  build-pdfs:
    runs-on: ubuntu-latest
    container:
      image: pandoc/extra:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate PDFs
        run: |
          mkdir -p pdfs

          # Shared pandoc options
          OPTS="--pdf-engine=xelatex \
            -V geometry:margin=2cm \
            -V fontsize=11pt \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue \
            -V mainfont=DejaVuSans \
            -V monofont=DejaVuSansMono \
            --highlight-style=tango"

          for file in handouts/*.md pre-workshop/setup-guide.md exercises/exercise-*.md; do
            filename=$(basename "$file" .md)
            echo "▶ $file → $filename.pdf"
            pandoc "$file" -o "pdfs/${filename}.pdf" $OPTS
            echo "✅ $filename.pdf"
          done

          echo ""
          echo "=== Generated PDFs ==="
          ls -lh pdfs/

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: workshop-handouts-pdf
          path: pdfs/*.pdf
          retention-days: 90

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [build-site, build-pdfs]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download site
        uses: actions/download-artifact@v4
        with:
          name: mkdocs-site
          path: site

      - name: Download PDFs
        uses: actions/download-artifact@v4
        with:
          name: workshop-handouts-pdf
          path: site/pdfs

      - name: Upload combined pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
